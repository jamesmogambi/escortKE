# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

  # Environment variables and secrets.
  # env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  # - variable: MESSAGE
  #   value: Hello world!
  #   availability:
  #     - BUILD
  #     - RUNTIME

  # Grant access to secrets in Cloud Secret Manager.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef
env:
  - variable: BRIGHT_DATA_USERNAME
    secret: BRIGHT_DATA_USERNAME
  - variable: BRIGHT_DATA_PASSWORD
    secret: BRIGHT_DATA_PASSWORD
  - variable: AWS_REGION
    secret: AWS_REGION
  - variable: AWS_ACCESS_KEY_ID
    secret: AWS_ACCESS_KEY_ID
  - variable: AWS_SECRET_ACCESS_KEY
    secret: AWS_SECRET_ACCESS_KEY
  - variable: MONGODB_URI
    secret: MONGODB_URI
  - variable: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    secret: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
  - variable: CLERK_SECRET_KEY
    secret: CLERK_SECRET_KEY
  - variable: DESIGN_SYSTEM
    secret: DESIGN_SYSTEM
  - variable: BASE_NAME
    secret: BASE_NAME
  - variable: CLOUDINARY_CLOUD_NAME
    secret: CLOUDINARY_CLOUD_NAME
  - variable: CLOUDINARY_API_KEY
    secret: CLOUDINARY_API_KEY
  - variable: CLOUDINARY_API_SECRET
    secret: CLOUDINARY_API_SECRET
  - variable: NEXT_PUBLIC_SITE_URL
    secret: NEXT_PUBLIC_SITE_URL
  - variable: NEXT_PUBLIC_SITE_NAME
    secret: NEXT_PUBLIC_SITE_NAME
  - variable: NEXT_PUBLIC_SITE_DESCRIPTION
    secret: NEXT_PUBLIC_SITE_DESCRIPTION
  - variable: NEXT_PUBLIC_GA_ID
    secret: NEXT_PUBLIC_GA_ID
  - variable: CONTACT_EMAIL
    secret: CONTACT_EMAIL
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
